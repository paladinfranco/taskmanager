<div class="modal-overlay" (click)="cancelled.emit()">
  <div class="modal-box card" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>Reasignar tarea</h3>
      <button class="btn-close" (click)="cancelled.emit()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="tarea-preview">{{ tarea.titulo }}</div>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label>Asignar a <span class="required">*</span></label>
        <select formControlName="usuarioDestinoId">
          <option *ngFor="let u of otrosUsuarios" [value]="u.id">{{ u.nombre }} — {{ u.ciudad }}</option>
        </select>
      </div>
      <div class="form-group">
        <label>Motivo de reasignación <span class="required">*</span></label>
        <textarea formControlName="motivo" placeholder="Indica el motivo..." rows="3" [class.is-invalid]="hasError('motivo')"></textarea>
        <span class="error-msg" *ngIf="hasError('motivo')">El motivo es obligatorio (mín. 5 caracteres)</span>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn" (click)="cancelled.emit()">Cancelar</button>
        <button type="submit" class="btn btn-purple" [disabled]="saving">
          {{ saving ? 'Reasignando...' : 'Reasignar' }}
        </button>
      </div>
    </form>
  </div>
</div>
