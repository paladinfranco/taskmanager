<div class="modal-overlay" (click)="cancelled.emit()">
  <div class="modal-box card" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>Nueva tarea</h3>
      <button class="btn-close" (click)="cancelled.emit()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label>Título <span class="required">*</span></label>
        <input formControlName="titulo" placeholder="Descripción breve de la tarea" [class.is-invalid]="hasError('titulo')">
        <span class="error-msg" *ngIf="hasError('titulo')">Título obligatorio (mín. 3 caracteres)</span>
      </div>
      <div class="form-group">
        <label>Descripción</label>
        <textarea formControlName="descripcion" placeholder="Detalles adicionales..." rows="3"></textarea>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn" (click)="cancelled.emit()">Cancelar</button>
        <button type="submit" class="btn btn-primary" [disabled]="saving">
          {{ saving ? 'Guardando...' : 'Crear tarea' }}
        </button>
      </div>
    </form>
  </div>
</div>
