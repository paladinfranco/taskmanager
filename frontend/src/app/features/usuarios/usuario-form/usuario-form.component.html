<div class="modal-overlay" (click)="cancelled.emit()">
  <div class="modal-box card" (click)="$event.stopPropagation()">

    <div class="modal-header">
      <h3>{{ usuario ? 'Editar usuario' : 'Nuevo usuario' }}</h3>
      <button class="btn-close" (click)="cancelled.emit()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-grid">
        <div class="form-group">
          <label>Nombre <span class="required">*</span></label>
          <input formControlName="nombre" placeholder="Nombre completo" [class.is-invalid]="hasError('nombre')">
          <span class="error-msg" *ngIf="hasError('nombre')">Nombre obligatorio (mín. 2 caracteres)</span>
        </div>
        <div class="form-group">
          <label>Email <span class="required">*</span></label>
          <input formControlName="email" placeholder="correo@ejemplo.com" [class.is-invalid]="hasError('email')">
          <span class="error-msg" *ngIf="hasError('email')">Email inválido</span>
        </div>
        <div class="form-group">
          <label>Ciudad</label>
          <input formControlName="ciudad" placeholder="Ej: Quito">
        </div>
        <div class="form-group">
          <label>Estado</label>
          <select formControlName="estado">
            <option value="activo">Activo</option>
            <option value="inactivo">Inactivo</option>
          </select>
        </div>
      </div>

      <!-- Teléfonos dinámicos -->
      <div class="form-group">
        <label>Teléfonos</label>
        <div formArrayName="telefonos">
          <div *ngFor="let tel of telefonos.controls; let i = index"
               [formGroupName]="i" class="telefono-row-wrap">
            <div class="telefono-row">
              <input formControlName="telefono"
                placeholder="09XXXXXXXX"
                maxlength="10"
                inputmode="numeric"
                (keypress)="soloNumeros($event)"
                (paste)="bloquearPaste($event)"
                [class.is-invalid]="tel.get('telefono')?.invalid && tel.get('telefono')?.touched">
              <select formControlName="tipo">
                <option value="principal">Principal</option>
                <option value="secundario">Secundario</option>
                <option value="otro">Otro</option>
              </select>
              <button type="button" class="btn btn-icon btn-danger" (click)="removeTelefono(i)">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
              </button>
            </div>
            <span class="error-msg"
              *ngIf="tel.get('telefono')?.invalid && tel.get('telefono')?.touched">
              Debe tener 10 dígitos y empezar con 09 (ej: 0991234567)
            </span>
          </div>
        </div>
        <button type="button" class="add-tel-btn" (click)="addTelefono()">
          + Agregar teléfono
        </button>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn" (click)="cancelled.emit()">Cancelar</button>
        <button type="submit" class="btn btn-primary" [disabled]="saving">
          {{ saving ? 'Guardando...' : (usuario ? 'Guardar cambios' : 'Crear usuario') }}
        </button>
      </div>
    </form>
  </div>
</div>
